<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FocusForge - Register</title>
        <link rel="stylesheet" href="/web/css/login.css">
        <link rel="stylesheet" href="/web/css/dashboard.css">
        <script type="module" src="/web/js/register.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    </head>
    <body class="auth-page">
        <div class="auth-container">

            <h1>Welcome to FocusForge</h1>
            <h2>Create Account</h2>

            <label for="username">Username</label>
            <input type="text" id="username" required minlength="6" maxlength="14">

            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" maxlength="20">

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required minlength="6" maxlength="20">

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <div class="tooltip-wrapper">
                <button class="btn btn-primary btn-full" id="registerBtn" disabled>Register</button>
                <span class="tooltip-text">Accept terms and conditions to register</span>
            </div>

            <button class="btn btn-outline btn-full" id="loginBtn">Back to Login</button>

            <p class="choiceText">Or Sign Up With</p>
            <button class="btn btn-outline btn-full google-btn" id="googleLogin">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo">
                Continue with Google
            </button>


            <div class="terms-check">

                <label>
                    <input type="checkbox" id="termsCheckbox" required>
                    <span>
                        I agree to
                        <a href="/web/html/terms.html" target="_blank">Terms and Conditions</a>
                    </span>
                </label>
            </div>
            
            <address>
                Contact us: <a href="mailto:infoFocusForge@gmail.com">infoFocusForge@gmail.com</a>
                <br>
                <br>
                &copy; 2026 Northstack Ltd. All rights reserved.
            </address>
        </div>

       

    </body>
</html>
