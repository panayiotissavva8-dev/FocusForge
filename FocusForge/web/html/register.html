<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusForge - Register</title>
    <link rel="stylesheet" href="/web/css/login.css">
    <link rel="stylesheet" href="/web/css/dashboard.css">
    <link rel="stylesheet" href="/web/css/register.css">
    <script type="module" src="/web/js/register.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="auth-page">
 
    <!-- Language switcher -->
    <div class="lang-bar">
        <svg style="width:1rem;height:1rem;color:var(--color-gray-500);"
             viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="2" y1="12" x2="22" y2="12"/>
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10
                     15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        <select id="auth-lang-select" onchange="changeAuthLanguage(this.value)">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="gr">Ελληνικά</option>
            <option value="it">Italiano</option>
        </select>
    </div>
 
    <div class="auth-container">
 
        <!-- Brand -->
        <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;">
            <svg style="width:2rem;height:2rem;color:var(--color-primary);"
                 viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
            <div>
                <div style="font-size:1.25rem;font-weight:700;
                            color:var(--color-gray-900);">FocusForge</div>
                <div id="auth-subtitle"
                     style="font-size:.813rem;color:var(--color-gray-500);">
                    Manage your upcoming exams
                </div>
            </div>
        </div>
 
        <h2 id="auth-title" style="margin-bottom:1.5rem;">Create your account</h2>
 
        <div style="display:flex;flex-direction:column;gap:1rem;">
 
            <div>
                <label for="username" id="lbl-username">Username</label>
                <input type="text" id="username" class="input"
                       required minlength="6" maxlength="14"
                       placeholder="6–14 characters"
                       style="margin-top:.35rem;">
            </div>
 
            <div>
                <label for="email" id="lbl-email">Email</label>
                <input type="email" id="email" class="input"
                       required placeholder="you@example.com"
                       style="margin-top:.35rem;">
            </div>
 
            <div>
                <label for="password" id="lbl-password">Password</label>
                <input type="password" id="password" class="input"
                       required minlength="6" maxlength="20"
                       placeholder="6–20 characters"
                       style="margin-top:.35rem;">
            </div>
 
            <div>
                <label for="confirmPassword" id="lbl-confirm">Confirm Password</label>
                <input type="password" id="confirmPassword" class="input"
                       required minlength="6" maxlength="20"
                       placeholder="Repeat your password"
                       style="margin-top:.35rem;">
            </div>
 
            <!-- Terms -->
            <div class="terms-check">
                <input type="checkbox" id="termsCheckbox" required>
                <label for="termsCheckbox" id="lbl-terms">
                    I agree to the
                    <a href="/web/html/terms.html" target="_blank"
                       id="lbl-terms-link">Terms and Conditions</a>
                </label>
            </div>
 
            <button class="btn btn-primary btn-full" id="registerBtn"
                    disabled style="height:2.75rem;font-size:.938rem;">
                <span id="btn-register-text">Create Account</span>
            </button>
 
            <button class="btn btn-outline btn-full" id="loginBtn"
                    style="height:2.75rem;font-size:.938rem;">
                <span id="btn-login-text">Back to Sign In</span>
            </button>
 
        </div>
 
        <div style="display:flex;align-items:center;gap:1rem;margin:1.25rem 0;">
            <div style="flex:1;height:1px;background:var(--color-gray-200);"></div>
            <span id="auth-or"
                  style="font-size:.813rem;color:var(--color-gray-500);">or</span>
            <div style="flex:1;height:1px;background:var(--color-gray-200);"></div>
        </div>
 
        <button class="btn btn-outline btn-full google-btn" id="googleLogin"
                style="height:2.75rem;font-size:.938rem;">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg"
                 alt="Google" style="width:1.125rem;height:1.125rem;">
            <span id="auth-google">Continue with Google</span>
        </button>
 
        <address style="margin-top:2rem;font-size:.75rem;
                        color:var(--color-gray-400);text-align:center;font-style:normal;">
            <a href="mailto:infoFocusForge@gmail.com"
               style="color:var(--color-gray-500);">Contact: infoFocusForge@gmail.com</a><br><br>
            &copy; 2026 Northstack Ltd. All rights reserved.
        </address>
 
    </div>
    </body>
</html>
