<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FocusForge - Register</title>
        <link rel="stylesheet" href="/web/css/register.css">
        <script type="module" src="/web/js/register.js" defer></script>
    </head>
    <body>
        <div class="auth-container">

            <h1>Create Account</h1>

            <label for="username">Username</label>
            <input type="text" id="username" required minlength="6" maxlength="14">

            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" maxlength="20">

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required minlength="6" maxlength="20">

            <label for="email">Email</label>
            <input type="email" id="email" required>

            <input id="registerBtn" type="submit" value="Register">
            <input id="loginBtn" type="button" value="Back to Login">

            <div class="terms-check">

                <label>
                    <input type="checkbox" id="termsCheckbox">
                    <span>
                        I agree to
                        <a href="/web/html/terms.html" target="_blank">Terms and Conditions</a>
                    </span>
                </label>
            </div>
            
            <address>
                Contact us: <a href="mailto:infoFocusForge@gmail.com">infoFocusForge@gmail.com</a>
                <br>
                <br>
                &copy; 2026 Northstack Ltd. All rights reserved.
            </address>
        </div>
    </body>
</html>
