<!DOCTYPE html>
<html lang = "en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>FocusForge - Login</title>
        <link rel="stylesheet" href="/web/css/login.css">
        <link rel="stylesheet" href="/web/css/dashboard.css">
        <script type="module" src="/web/js/login.js" defer></script>
    </head>
    <body>
        <div class="auth-container">
            <h1>Welcome to FocusForge</h1>
            <h2>Login</h2>

            <label for="username">Username</label>
            <input type="text" id="username" required minlength="6" maxlength="14">

            <label for="password">Password</label>
            <input type="password" id="password" required minlength="6" maxlength="20">

            <button class="btn btn-primary btn-full" id="sign">Sign In</button>
            <button class="btn btn-outline btn-full" id="register">Register</button>

            <address>
                Contact us: <a href="mailto:infoFocusForge@gmail.com">infoFocusForge@gmail.com</a>
                <br>
                <br>
                 &copy: 2026 Northstack Ltd. All rights reserved.
            </address>
        </div>
    </body>
</html>
