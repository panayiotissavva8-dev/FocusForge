<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusForge - Dashboard</title>
    <link rel="stylesheet" href="/web/css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <!-- Menu Bar Container (loaded from backend) -->
    <div id="menu-container"></div>

    <!-- Menu Bar (fallback/additional controls) -->
    <div class="menubar">
        <div class="container">
            <div class="menubar-content">
                <div class="menubar-actions">
                    <button class="btn btn-primary" onclick="openDialog()">
                        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                       <span data-i18n="add-exam-button"></span>
                    </button>

                    <button class="btn btn-outline settings-btn" onclick="openSettings()">
                        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:1em; height:1em; vertical-align:middle;">
                            <path d="M12.22 2a10 10 0 0 0-1.22 0l-.54 2.7a8.53 8.53 0 0 0-2.42 1l-2.5-1.16a10 10 0 0 0-1.72 1.72l1.16 2.5a8.53 8.53 0 0 0-1 2.42l-2.7.54a10 10 0 0 0 0 2.44l2.7.54a8.53 8.53 0 0 0 1 2.42l-1.16 2.5a10 10 0 0 0 1.72 1.72l2.5-1.16a8.53 8.53 0 0 0 2.42 1l.54 2.7a10 10 0 0 0 2.44 0l.54-2.7a8.53 8.53 0 0 0 2.42-1l2.5 1.16a10 10 0 0 0 1.72-1.72l-1.16-2.5a8.53 8.53 0 0 0 1-2.42l2.7-.54a10 10 0 0 0 0-2.44l-2.7-.54a8.53 8.53 0 0 0-1-2.42l1.16-2.5a10 10 0 0 0-1.72-1.72l-2.5 1.16a8.53 8.53 0 0 0-2.42-1L12.22 2z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                       <span data-i18n="settings-button"></span>
                    </button>
                </div>
                <div class="brand">
                    <svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                        <path d="M6 12v5c3 3 9 3 12 0v-5"/>
                    </svg>
                    <div class ="header-text">
                        <h1>FocusForge</h1>
                        <p class="subtitle" data-i18n="title-sub-text"></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            <div id="stats-bar">

    <div class="exam-card stats-card">
        <div class="stats-label" data-i18n="stat-total">Total Exams</div>
        <div id="stat-total" class="stats-number">0</div>
    </div>

    <div class="exam-card stats-card">
        <div class="stats-label" data-i18n="stat-upcoming">Upcoming</div>
        <div id="stat-upcoming" class="stats-number" style="color:var(--color-primary);">0</div>
    </div>

    <div class="exam-card stats-card">
        <div class="stats-label" data-i18n="stat-completed">Completed</div>
        <div id="stat-completed" class="stats-number" style="color:#16a34a;">0</div>
    </div>

    <div class="exam-card stats-card">
        <div class="stats-label" data-i18n="stat-next">Next Exam</div>
        <div id="stat-next" class="stats-number" style="font-size:1rem;">—</div>
    </div>

</div>
 
    <!-- Upcoming -->
    <div class="exam-card" style="padding:1rem 1.25rem;">
        <div style="font-size:.75rem;font-weight:500;
                    color:var(--color-gray-500);margin-bottom:.25rem;"
             data-i18n="stat-upcoming">Upcoming</div>
        <div id="stat-upcoming"
             style="font-size:1.75rem;font-weight:700;
                    color:var(--color-primary);">0</div>
    </div>
 
    <!-- Completed -->
    <div class="exam-card" style="padding:1rem 1.25rem;">
        <div style="font-size:.75rem;font-weight:500;
                    color:var(--color-gray-500);margin-bottom:.25rem;"
             data-i18n="stat-completed">Completed</div>
        <div id="stat-completed"
             style="font-size:1.75rem;font-weight:700;
                    color:#16a34a;">0</div>
    </div>
 
    <!-- Next Exam Countdown -->
    <div class="exam-card" style="padding:1rem 1.25rem;">
        <div style="font-size:.75rem;font-weight:500;
                    color:var(--color-gray-500);margin-bottom:.25rem;"
             data-i18n="stat-next">Next Exam</div>
        <div id="stat-next"
             style="font-size:1.25rem;font-weight:700;
                    color:var(--color-gray-900);line-height:1.2;">—</div>
    </div>
</div>
            <!-- Tabs -->
              <div class="tabs">
                <div class="tabs-list">
                    <button class="tab-trigger active" onclick="switchTab(event, 'upcoming')">
                        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        </svg>
                        <span data-i18n="upcoming-exams"></span>
                        (<span id="upcoming-count">0</span>)
                    </button>
                    <button class="tab-trigger" onclick="switchTab(event, 'completed')">
                        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                        <span data-i18n="completed-exams"></span>
                        (<span id="completed-count">0</span>)
                    </button>
                    <button class="tab-trigger" onclick="switchTab(event, 'study')">
                        <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M7 10H6a4 4 0 0 1-4-4 1 1 0 0 1 1-1h3.9a2 2 0 0 0 1.96 1.7L11 7h4l1.14-1.3a2 2 0 0 0 1.96-1.7H21a1 1 0 0 1 1 1 4 4 0 0 1-4 4h-1"/>
                            <path d="M10 10v10h4V10"/>
                             <path d="M8 20h8"/>
                             <path d="M15 3l1 1"/>
                             <path d="M9 3l-1 1"/>
                            </svg>
                        <span data-i18n="study-plan"></span>
                    </button>
                </div>

                <!-- Upcoming Tab Content -->
                <div id="upcoming-tab" class="tab-content active">
                    <div id="upcoming-exams" class="exam-grid">
                        <!-- Empty state -->
                        <div class="empty-state">
                            <svg class="icon icon-xl empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                            </svg>
                            <h3 data-i18n="no-upcoming-exams"></h3>
                            <p data-i18n="no-upcoming-sub-text"></p>
                        </div>
                    </div>
                </div>

                <!-- Completed Tab Content -->
                 <div id="completed-tab" class="tab-content">
                    <div id="completed-exams" class="exam-grid">
                        <!-- Empty state -->
                         <div class="empty-state">
                            <svg class="icon icon-xl empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                                <polyline points="22 4 12 14.01 9 11.01"/>
                            </svg>
                            <h3 data-i18n="no-completed-exams"></h3>
                            <p data-i18n="no-completed-sub-text"></p>
                        </div>
                    </div>
                </div>
                
                <!-- Study Plan Tab Content -->
                 <div id="study-tab" class="tab-content">
    <div id="study-plan-root" class="study-grid">
        <!-- Rendered by JS -->
    </div>
</div>
                    
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Dialog/Modal -->
    <div id="exam-dialog" class="dialog-overlay">
        <div class="dialog-content">
            <div class="dialog-header">
                <h2 id="dialog-title" data-i18n="add-new-exam"></h2>
                <p id="dialog-description" data-i18n="add-new-exam-sub-text"></p>
            </div>
            <form id="exam-form" class="dialog-body">
                <div class="form-group">
                    <label for="subject" data-i18n="exam-name"></label>
                    <input type="text" id="subject" class="input" data-i18n-placeholder="exam-name-placeholder" required>
                </div>
                <div class="form-group">
                    <label for="deadline" data-i18n="exam-date"></label>
                    <input type="date" id="deadline" class="input" required>
                </div>
                <div class="form-group">
                    <label for="difficulty" data-i18n="difficulty"></label>
                    <select id="difficulty" class="select">
                        <option value="none" data-i18n="difficulty-none"></option>
                        <option value="low" data-i18n="difficulty-low"></option>
                        <option value="medium" data-i18n="difficulty-medium"></option>
                        <option value="high" data-i18n="difficulty-high"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="reminder" data-i18n="reminder"></label>
                    <select id="reminder" class="select">
                        <option value="none" data-i18n="reminder-none"></option>
                        <option value="1_day" data-i18n="reminder-1day"></option>
                        <option value="3_days" data-i18n="reminder-3days"></option>
                        <option value="1_week" data-i18n="reminder-1week"></option>
                    </select>
                </div>
                <div class="form-group checkbox-group">
                    <input type="checkbox" id="completed" class="checkbox">
                    <label for="completed" data-i18n="mark-as-completed"></label>
                </div>
                <div id="grade-group" class="form-group" style="display: none;">
                    <label for="grade" data-i18n="grade"></label>
                    <input type="text" id="grade" class="input" data-i18n-placeholder="exam-grade-placeholder">
                </div>
            </form>
            <div class="dialog-footer">
                <button type="button" class="btn btn-outline" onclick="closeDialog()" data-i18n="exam-cancel"></button>
                <button type="submit" form="exam-form" class="btn btn-primary" id="submit-btn" data-i18n="add-exam-button"></button>
            </div>
        </div>
    </div>

    <!-- Settings Dialog -->
      <div id="settings-dialog" class="dialog-overlay">
        <div class="dialog-content">
            <div class="dialog-header">
                <div class="header-text">
                    <h2 data-i18n="settings-title"></h2>
                    <p data-i18n="settings-sub-text"></p>
                </div>
                <button type="button" class="btn btn-outline" onclick="closeSettings()" data-i18n="settings-close"></button>
            </div>
            <div class="dialog-body">
                <div class="form-group">
                    <label for="theme-select" data-i18n="theme"></label>
                    <select id="theme-select" class="select" onchange="changeTheme(this.value)">
                        <option value="light" data-i18n="theme-light"></option>
                        <option value="dark" data-i18n="theme-dark"></option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="language-select" data-i18n="language"></label>
                    <select id="language-select" class="select" onchange="changeLanguage(this.value)">
                        <option value="en" data-i18n="language-english"></option>
                        <option value="es" data-i18n="language-spanish"></option>
                        <option value="fr" data-i18n="language-french"></option>
                        <option value="gr" data-i18n="language-greek"></option>
                        <option value="it" data-i18n="language-italian"></option>
                    </select>
                </div>
                <div class="form-group">
                <button class="btn btn-outline" id="logoutBtn" onclick="logout()">
                    <svg class="icon icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                    <span data-i18n="sign-out"></span>
                </button>
                </div>
            </div>
           
        </div>
        </div>
    

    

    <script src="/web/js/dashboard.js"></script>
</body>
</html>
